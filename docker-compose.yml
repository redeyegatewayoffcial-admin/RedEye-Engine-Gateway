version: "3.9"

# ==============================================================================
# RedEye Policy Engine - Infrastructure Stack
# ==============================================================================
# Services:
#   - postgres     → User config, API keys, policy rules
#   - redis        → Rate limiting counters, token bucket state
#   - clickhouse   → Immutable append-only telemetry / audit log
#   - gateway      → Rust Axum reverse proxy (built in Phase 2+)
# ==============================================================================

networks:
  redeye-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  # Stores: tenants, API keys, routing rules, policy configurations.
  # We pin to pg16 with SHA256 digest for supply chain security.
  postgres:
    image: pgvector/pgvector:pg16@sha256:a3446384800053c75459d42a0e8c3918bc547f0d7c98c33c6590d2d5b7f6d3b4
    container_name: redeye_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Seed script runs automatically on first boot
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - redeye-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER must be set} -d ${POSTGRES_DB:?POSTGRES_DB must be set}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  # Stores: sliding-window rate limit counters, token bucket state per tenant.
  # Now upgraded to redis-stack with SHA256 digest for supply chain security.
  redis:
    image: redis/redis-stack-server:7.2.0-v8@sha256:8c4d8d6f4f5e4d6a8b3c7e9f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b
    container_name: redeye_redis
    restart: unless-stopped
    environment:
      REDIS_ARGS: "--requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set} --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy allkeys-lru"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - redeye-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ClickHouse ────────────────────────────────────────────────────────────────
  # Stores: immutable request/response telemetry, PII audit events, latency logs.
  # Pinned to 24.3-alpine with SHA256 digest for supply chain security.
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine@sha256:a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9a0b1c2d3e4f5a6b7c8d9e0f1a2b
    container_name: redeye_clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:?CLICKHOUSE_USER must be set}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:?CLICKHOUSE_DB must be set}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"   # HTTP interface (used by Rust client)
      - "9000:9000"   # Native TCP interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
    networks:
      - redeye-net
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user=${CLICKHOUSE_USER:?CLICKHOUSE_USER must be set} --password=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set} --query='SELECT 1'"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Authentication API ─────────────────────────────────────────────────────────
  redeye_auth:
    build:
      context: .
      dockerfile: ./redeye_auth/Dockerfile
    container_name: redeye_auth
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL must be set}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - AES_MASTER_KEY=${AES_MASTER_KEY:?AES_MASTER_KEY must be set}
      - RUST_LOG=info
    networks:
      - redeye-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── Gateway API ────────────────────────────────────────────────────────────────
  redeye_gateway:
    build:
      context: .
      dockerfile: ./redeye_gateway/Dockerfile
    container_name: redeye_gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL must be set}
      - REDIS_URL=${REDIS_URL:?REDIS_URL must be set}
      - CLICKHOUSE_URL=${CLICKHOUSE_URL:?CLICKHOUSE_URL must be set}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - AES_MASTER_KEY=${AES_MASTER_KEY:?AES_MASTER_KEY must be set}
      - OPENAI_API_KEY=${OPENAI_API_KEY:?OPENAI_API_KEY must be set}
      - GATEWAY_PORT=8080
      - RUST_LOG=info
    networks:
      - redeye-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

