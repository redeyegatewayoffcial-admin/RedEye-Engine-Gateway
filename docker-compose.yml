version: "3.9"

# ==============================================================================
# NexusAI Policy Engine - Infrastructure Stack
# ==============================================================================
# Services:
#   - postgres     → User config, API keys, policy rules
#   - redis        → Rate limiting counters, token bucket state
#   - clickhouse   → Immutable append-only telemetry / audit log
#   - gateway      → Rust Axum reverse proxy (built in Phase 2+)
# ==============================================================================

networks:
  nexusai-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  # Stores: tenants, API keys, routing rules, policy configurations.
  # We pin to 16-alpine for a minimal, production-grade image.
  postgres:
    image: postgres:16-alpine
    container_name: nexusai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexusai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexusai_secret}
      POSTGRES_DB: ${POSTGRES_DB:-nexusai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Seed script runs automatically on first boot
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - nexusai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexusai} -d ${POSTGRES_DB:-nexusai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  # Stores: sliding-window rate limit counters, token bucket state per tenant.
  # AOF persistence ensures counters survive restarts without full DB sync.
  redis:
    image: redis:7.2-alpine
    container_name: nexusai_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secret}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nexusai-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ClickHouse ────────────────────────────────────────────────────────────────
  # Stores: immutable request/response telemetry, PII audit events, latency logs.
  # ClickHouse is chosen over Postgres for analytics because:
  #   - Columnar storage → 10-100x faster aggregation queries (GROUP BY, SUM)
  #   - MergeTree engine → append-only writes at millions of rows/sec
  #   - Built-in TTL → auto-expire logs after 90 days
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: nexusai_clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-nexusai}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse_secret}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-nexusai_telemetry}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"   # HTTP interface (used by Rust client)
      - "9000:9000"   # Native TCP interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
    networks:
      - nexusai-net
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user=${CLICKHOUSE_USER:-nexusai} --password=${CLICKHOUSE_PASSWORD:-clickhouse_secret} --query='SELECT 1'"]
      interval: 15s
      timeout: 10s
      retries: 5
